<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Ads Spy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f0f; color: #fff; font-family: -apple-system, sans-serif; padding: 24px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; }
  .add-form { display: flex; gap: 8px; margin-bottom: 32px; }
  .add-form input { flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; color: #fff; font-size: 14px; outline: none; }
  .add-form input:focus { border-color: #555; }
  .btn { background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 10px 16px; font-size: 14px; cursor: pointer; white-space: nowrap; }
  .btn:hover { background: #1d4ed8; }
  .layout { display: grid; grid-template-columns: 220px 1fr; gap: 24px; }
  .sidebar h2, .main h2 { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
  .competitor { background: #1a1a1a; border-radius: 8px; margin-bottom: 6px; overflow: hidden; }
  .competitor-btn { width: 100%; text-align: left; background: none; border: none; color: #fff; padding: 10px 12px; font-size: 13px; cursor: pointer; }
  .competitor-btn:hover { background: #222; }
  .competitor.active .competitor-btn { background: #2563eb; }
  .sync-btn { width: 100%; text-align: left; background: none; border: none; color: #555; padding: 0 12px 8px; font-size: 11px; cursor: pointer; }
  .sync-btn:hover { color: #aaa; }
  .filters { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
  .filters select { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 6px 10px; color: #fff; font-size: 13px; outline: none; margin-left: auto; }
  .ad { background: #1a1a1a; border-radius: 10px; padding: 16px; margin-bottom: 8px; }
  .ad-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; }
  .badge.active { background: #14532d; color: #86efac; }
  .badge.inactive { background: #1a1a1a; color: #555; border: 1px solid #333; }
  .ad-name { font-size: 12px; color: #555; }
  .ad-days { font-size: 12px; color: #555; }
  .ad-body { font-size: 13px; color: #ccc; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .ad-link { font-size: 12px; color: #2563eb; text-decoration: none; white-space: nowrap; }
  .ad-link:hover { color: #60a5fa; }
  .ad-row { display: flex; gap: 16px; align-items: flex-start; }
  .empty { color: #444; font-size: 13px; text-align: center; padding: 60px 0; }
</style>
</head>
<body>
<h1>Meta Ads Spy</h1>
<div class="add-form">
  <input id="urlInput" type="text" placeholder="https://www.facebook.com/pagename" onkeydown="if(event.key==='Enter')addCompetitor()">
  <button class="btn" onclick="addCompetitor()">+ Добавить</button>
</div>
<div class="layout">
  <div class="sidebar">
    <h2>Конкуренты</h2>
    <div id="competitors">
      <div class="competitor active">
        <button class="competitor-btn" onclick="selectCompetitor(null, this)">Все конкуренты</button>
      </div>
    </div>
  </div>
  <div class="main">
    <div class="filters">
      <h2 style="margin:0">Объявления</h2>
      <select onchange="statusFilter=this.value; loadAds()">
        <option value="">Все статусы</option>
        <option value="active">Активные</option>
        <option value="inactive">Остановленные</option>
      </select>
    </div>
    <div id="ads"><div class="empty">Добавь конкурента и нажми "Обновить"</div></div>
  </div>
</div>
<script>
let selectedId = null;
let statusFilter = '';

async function loadCompetitors() {
  const res = await fetch('/api/competitors');
  const data = await res.json();
  const el = document.getElementById('competitors');
  el.innerHTML = '<div class="competitor active"><button class="competitor-btn" onclick="selectCompetitor(null, this)">Все конкуренты</button></div>';
  data.forEach(c => {
    el.innerHTML += '<div class="competitor"><button class="competitor-btn" onclick="selectCompetitor(' + c.id + ', this)">' + c.name + '</button><button class="sync-btn" onclick="syncAds(' + c.id + ', this)">↻ Обновить</button></div>';
  });
}

async function loadAds() {
  const params = new URLSearchParams();
  if (selectedId) params.set('competitor_id', selectedId);
  if (statusFilter) params.set('status', statusFilter);
  const res = await fetch('/api/ads?' + params);
  const data = await res.json();
  const el = document.getElementById('ads');
  if (!data.length) { el.innerHTML = '<div class="empty">Нет объявлений</div>'; return; }
  el.innerHTML = data.map(ad => '<div class="ad"><div class="ad-row"><div style="flex:1"><div class="ad-meta"><span class="badge ' + ad.status + '">' + (ad.status === 'active' ? 'Активно' : 'Остановлено') + '</span><span class="ad-name">' + ad.competitor_name + '</span><span class="ad-days">· ' + ad.days_active + ' дней</span></div><div class="ad-body">' + (ad.body || 'Нет текста') + '</div></div>' + (ad.snapshot_url ? '<a class="ad-link" href="' + ad.snapshot_url + '" target="_blank">Открыть →</a>' : '') + '</div></div>').join('');
}

async function addCompetitor() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;
  await fetch('/api/competitors', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({page_url: url}) });
  document.getElementById('urlInput').value = '';
  loadCompetitors();
}

async function syncAds(id, btn) {
  btn.textContent = '⟳ Синхронизация...';
  const res = await fetch('/api/sync', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({competitor_id: id}) });
  const data = await res.json();
  btn.textContent = '↻ Обновить';
  alert('Загружено ' + data.synced + ' новых объявлений');
  loadAds();
}

function selectCompetitor(id, btn) {
  selectedId = id;
  document.querySelectorAll('.competitor').forEach(el => el.classList.remove('active'));
  btn.closest('.competitor').classList.add('active');
  loadAds();
}

loadCompetitors();
loadAds();
</script>
</body>
</html>
